services:
  - type: web
    name: document-extraction-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_API_KEY
        sync: false
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract